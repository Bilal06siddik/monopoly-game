<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a0a00"/>
  <!-- Body -->
  <rect x="20" y="36" width="24" height="20" fill="#e17055"/>
  <!-- Jacket lapels -->
  <rect x="20" y="36" width="6" height="12" fill="#c0392b"/>
  <rect x="38" y="36" width="6" height="12" fill="#c0392b"/>
  <!-- Shirt -->
  <rect x="26" y="38" width="12" height="12" fill="#fff5e6"/>
  <!-- Neck -->
  <rect x="28" y="32" width="8" height="6" fill="#f0c080"/>
  <!-- Head -->
  <rect x="20" y="14" width="24" height="20" fill="#f0c080"/>
  <!-- Hair (spiky) -->
  <rect x="20" y="10" width="24" height="6" fill="#e17055"/>
  <rect x="22" y="6" width="4" height="6" fill="#e17055"/>
  <rect x="30" y="4" width="4" height="8" fill="#e17055"/>
  <rect x="38" y="6" width="4" height="6" fill="#e17055"/>
  <!-- Eyes (determined look) -->
  <rect x="24" y="20" width="5" height="3" fill="#2d3436"/>
  <rect x="35" y="20" width="5" height="3" fill="#2d3436"/>
  <rect x="22" y="18" width="7" height="2" fill="#2d3436"/>
  <rect x="35" y="18" width="7" height="2" fill="#2d3436"/>
  <!-- Eye shine -->
  <rect x="26" y="21" width="1" height="1" fill="#fff"/>
  <rect x="37" y="21" width="1" height="1" fill="#fff"/>
  <!-- Smirk -->
  <rect x="30" y="28" width="8" height="2" fill="#2d3436"/>
  <rect x="38" y="26" width="2" height="4" fill="#2d3436"/>
  <!-- Arms -->
  <rect x="10" y="36" width="10" height="4" fill="#e17055"/>
  <rect x="44" y="36" width="10" height="4" fill="#e17055"/>
  <!-- Hands -->
  <rect x="8" y="38" width="4" height="6" fill="#f0c080"/>
  <rect x="52" y="38" width="4" height="6" fill="#f0c080"/>
  <!-- Legs -->
  <rect x="22" y="56" width="8" height="8" fill="#2d3436"/>
  <rect x="34" y="56" width="8" height="8" fill="#2d3436"/>
  <!-- Flame accent -->
  <rect x="44" y="10" width="2" height="4" fill="#fdcb6e" opacity="0.8"/>
  <rect x="18" y="10" width="2" height="4" fill="#fdcb6e" opacity="0.8"/>
</svg>
